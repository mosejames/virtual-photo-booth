<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Virtual Photo Booth">
  <title>Virtual Photo Booth</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app" data-screen="select">

    <!-- SCREEN 1: Format Selection -->
    <section id="screen-select" class="screen">
      <header class="app-header">
        <h1 class="header-title">Virtual Photo Booth</h1>
        <p class="tagline">Frame your moment</p>
      </header>

      <div class="format-section">
        <p class="format-prompt">Choose your format</p>
        <div class="format-options">
          <button class="format-btn" data-format="portrait">
            <div class="format-preview" style="aspect-ratio: 4/5;">
              <span class="format-label">Portrait</span>
              <span class="format-size">4:5</span>
            </div>
          </button>
          <button class="format-btn" data-format="story">
            <div class="format-preview" style="aspect-ratio: 9/16;">
              <span class="format-label">Story</span>
              <span class="format-size">9:16</span>
            </div>
          </button>
          <button class="format-btn" data-format="square">
            <div class="format-preview" style="aspect-ratio: 1/1;">
              <span class="format-label">Square</span>
              <span class="format-size">1:1</span>
            </div>
          </button>
        </div>
      </div>

      <footer class="app-footer">
        <p class="footer-text">Virtual Photo Booth</p>
      </footer>
    </section>

    <!-- SCREEN 2: Edit & Position -->
    <section id="screen-edit" class="screen">
      <div id="canvas-wrapper">
        <canvas id="preview-canvas"></canvas>
        <div id="upload-overlay">
          <div class="upload-prompt">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span>Tap to upload photo</span>
          </div>
        </div>
      </div>
      <input type="file" id="photo-input" accept="image/*" hidden>

      <div class="name-fields">
        <input type="text" id="input-name" placeholder="Your name or @handle" maxlength="30" autocomplete="off">
        <input type="text" id="input-title" placeholder="Your title (optional)" maxlength="40" autocomplete="off">
      </div>

      <div class="edit-controls">
        <button id="btn-upload" class="btn btn-secondary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Change Photo
        </button>
        <button id="btn-download" class="btn btn-primary" disabled>Download Photo</button>
      </div>
      <p id="edit-hint" class="hint">Drag to position. Pinch to zoom.</p>

      <button id="btn-back" class="btn-text">&larr; Back</button>
    </section>

    <!-- SCREEN 3: Done -->
    <section id="screen-done" class="screen">
      <div class="done-content">
        <div class="done-check">&check;</div>
        <h2>Photo Saved!</h2>
        <p class="done-message">Check your downloads folder and share your photo.</p>
        <p id="ios-hint" class="ios-hint" hidden>Long-press the image to save it to your camera roll.</p>
      </div>
      <div class="done-actions">
        <button id="btn-another" class="btn btn-primary">Take Another</button>
        <a href="gallery.html" class="btn btn-secondary gallery-link">View Gallery</a>
      </div>
    </section>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
